<!--진로 명확한 애들 검색 화면-->

<!Doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="2026드림팀">
        <title>선택과목 가이드</title>
      <link rel="stylesheet" href="focused.css">
    </head>
    <body>
        <script src="focused.js" defer></script>
        <!--main.js에 dropdown클래스에 대해서 
        dropdown-button누르면 dropdown-menu보여주게-->

        <div id="search">
            <!--학교 선택-->
            <div class="dropdown" id="select-univ">
                <button class="dropdown-button">대학 선택(선택)</button>
                <div class="dropdown-menu" hidden>
                  <label class="univ"><input type="checkbox" value="서울대"> 서울대</label>
                  <label class="univ"><input type="checkbox" value="연세대"> 연세대</label>
                  <label class="univ"><input type="checkbox" value="고려대"> 고려대</label>
                  <label class="univ"><input type="checkbox" value="한양대"> 한양대</label>
                  <label class="univ"><input type="checkbox" value="중앙대"> 중앙대</label>
                </div>
            </div>

            <!--계열 선택-->
            <div class="dropdown" id="select-dicipline">
                <button class="dropdown-button">계열 선택</button>
                <div class="dropdown-menu" hidden>
                  <label class="univ"><input type="checkbox" value="공학"> 공학</label>
                  <label class="univ"><input type="checkbox" value="자연"> 자연</label>
                  <label class="univ"><input type="checkbox" value="인문"> 인문</label>
                  <label class="univ"><input type="checkbox" value="사회"> 사회</label>
                  <label class="univ"><input type="checkbox" value="의약"> 의약</label>
                  <label class="univ"><input type="checkbox" value="예체능"> 예체능</label>
                </div>
            </div>

            <!--학과 선택-->
            <div class="dropdown" id="select-major">
                <button class="dropdown-button">학과 선택</button>
                <div class="dropdown-menu" hidden>
                  <div class="univ">계열을 먼저 선택하면 학과 목록이 나타납니다.</div>
                </div>
            </div>

            <!--중요한건 이제 학교나 계열 선택시 학과 선택했던거 초기화-->
            <!--학교, 게열에 맞게 학과 리스트 다시 세팅-->
            <button id="search-button">검색</button>
        </div>

        <!--검색하면 hidden 풀리게 js짜기-->
        <div id="view-result" hidden>
            <h4>핵심 권장 과목</h4>
            <div id="subjects-recommend">
                <!-- 여기에 권장 과목들이 표시될 예정 -->
                <!--아래에 있는 형식으로 js짜기-->
                <div class="subject-tag"></div>
            </div>
        </div>
    </body>
</html>
